<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ポケモンまなびタウン</title>
  <link rel="stylesheet" href="style.css?v=20260623-pathguide1">
  <link rel="icon" href="apple-touch-icon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="まなびタウン">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#7ed2ff">
  <meta name="format-detection" content="telephone=no">
</head>
<body>
  <div id="landscapeWarning" class="landscapeWarning" aria-live="polite">
    <div class="landscapeWarningPanel">
      <div class="landscapeWarningTitle">横向きにしてね</div>
      <div class="landscapeWarningText">おままごと広場は横画面であそべるよ</div>
      <button type="button" class="landscapeBackButton" onclick="goHome()">ホームにもどる</button>
    </div>
  </div>
  <main id="app">
    <section id="townScreen" class="screen">
      <header class="townHeader">
        <div>
          <p class="eyebrow">ポケモンとまなぶ</p>
          <h1>まなびタウン</h1>
        </div>
      </header>

      <div class="townMap townScene" aria-label="まなびタウン">
        <div class="townSkyline"></div>
        <div class="townSun">☺</div>
        <div class="townHill townHillBack"></div>
        <div class="townHill townHillFront"></div>
        <div class="townRoad townRoadMain"></div>
        <div class="townRoad townRoadCross"></div>
        <div class="townCrosswalk crosswalkOne"></div>
        <div class="townCrosswalk crosswalkTwo"></div>
        <div class="townPond"></div>
        <div class="townTree treeOne"></div>
        <div class="townTree treeTwo"></div>
        <div class="townTree treeThree"></div>
        <div class="townTree treeFour"></div>
        <div class="townBench benchOne"></div>
        <div class="townBench benchTwo"></div>

        <button class="townBuilding schoolBuilding" onclick="openArea('math')" aria-label="さんすう広場">
          <span class="buildingRoof"></span>
          <span class="buildingIcon">＋</span>
          <span class="buildingSign">さんすう広場</span>
          <span class="buildingSub">足し算・引き算</span>
        </button>

        <button class="townBuilding libraryBuilding" onclick="openArea('word')" aria-label="ことば広場">
          <span class="buildingRoof"></span>
          <span class="buildingIcon">あ</span>
          <span class="buildingSign">ことば広場</span>
          <span class="buildingSub">ひらがな・カタカナ・漢字</span>
        </button>

        <button class="townBuilding atelierBuilding" onclick="openArea('pretend')" aria-label="おままごと広場">
          <span class="buildingRoof"></span>
          <span class="buildingIcon">✂</span>
          <span class="buildingSign">おままごと広場</span>
          <span class="buildingSub">ステッカー遊び</span>
        </button>

        <button class="townBuilding giftBuilding" onclick="openArea('gift')" aria-label="プレゼント広場">
          <span class="buildingRoof"></span>
          <span class="buildingIcon">🎁</span>
          <span class="buildingSign">プレゼント広場</span>
          <span class="buildingSub">ごほうび</span>
        </button>
      </div>

      <section id="homeDexPanel" class="homeDexPanel">
        <div class="homeDexHeader">
          <div>
            <p class="eyebrow">📖 ポケモン図鑑</p>
            <h2>ポケモン</h2>
          </div>
          <button class="homeDexButton" onclick="openArea('dex')">ひらく</button>
        </div>
        <div id="homeDexCount" class="homeDexCount">0 / 200</div>
        <div id="homeDexPreview" class="homeDexPreview"></div>
      </section>
    </section>

    <section id="areaScreen" class="screen hidden">
      <header class="appHeader">
        <button class="backButton" onclick="goHome()">←</button>
        <div>
          <p id="areaKicker" class="eyebrow">ひろば</p>
          <h1 id="areaTitle">さんすう広場</h1>
        </div>
        <button class="iconButton" onclick="openArea('dex')">📖</button>
      </header>

      <div id="areaMenu" class="menuGrid"></div>
      <div id="placeholderPanel" class="panel hidden"></div>

      <section id="stickerArea" class="panel stickerPanel hidden">
        <div class="stickerTopbar">
          <div>
            <p class="eyebrow">🎨 おままごと広場</p>
            <h2>ポケモンといっしょにあそぼう</h2>
          </div>
          <button onclick="clearStickers()">ぜんぶけす</button>
        </div>

        <div class="stickerPlayLayout">
          <div id="stickerBoard" class="stickerBoard boardRoom" aria-label="ステッカーを貼る場所">
            <button type="button" id="stickerToolboxButton" class="stickerToolboxButton" onclick="toggleStickerToolbox()" aria-label="どうぐばこ">🎒</button>
            <div id="stickerShelfControls" class="stickerShelfControls" aria-label="アイテムカテゴリ">
              <button type="button" class="shelfCategoryButton pokemonCategoryButton" onclick="openStickerShelf('pokemon')"><img class="shelfCategoryIcon" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" alt=""><span>ポケモン</span></button>
              <button type="button" class="shelfCategoryButton" onclick="openStickerShelf('furniture')">🛌<span>家具</span></button>
              <button type="button" class="shelfCategoryButton" onclick="openStickerShelf('food')">🍔<span>食べ物</span></button>
              <button type="button" class="shelfCategoryButton" onclick="openStickerShelf('play')">⚾<span>遊び道具</span></button>
              <button type="button" class="shelfCategoryButton" onclick="openStickerShelf('decoration')">🌸<span>装飾</span></button>
              <button type="button" class="shelfCategoryButton" onclick="openStickerShelf('background')">🖼️<span>背景</span></button>
            </div>

            <div id="stickerShelf" class="stickerShelf" aria-hidden="true">
              <div class="stickerShelfHeader">
                <strong id="stickerShelfTitle">アイテム</strong>
                <button type="button" class="stickerShelfClose" onclick="closeStickerShelf()" aria-label="棚を閉じる">×</button>
              </div>
              <div id="stickerShelfItems" class="stickerShelfItems"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="gameScreen" class="hidden">
        <h2 id="pokemonName">ポケモン</h2>

        <div id="battleArea">
          <div id="grass"></div>
          <img id="pokemonImage" src="" alt="ポケモン" onclick="playCry(currentPokemon.pokemonId)">
          <img id="ballImg" src="ball.png" alt="モンスターボール">
          <div id="catchEffect">ゲットだぜ！</div>
        </div>

        <div id="message"></div>

        <div id="questionArea">
          <h2 id="question">1 + 1 = ?</h2>
          <div id="visualQuestion"></div>
          <input id="answerInput" type="number" autocomplete="off" inputmode="numeric">
          <div class="buttonRow">
            <button id="answerButton" onclick="checkAnswer()">こたえる</button>
            <button id="hintButton" onclick="showHint()">💡ヒント</button>
            <button onclick="changePokemon()">べつのポケモン</button>
          </div>
        </div>

        <div id="catchArea" class="hidden">
          <button id="throwButton" onclick="throwBall()">モンスターボールをなげる！</button>
        </div>

        <div id="nextArea" class="hidden">
          <button id="nextButton" onclick="nextPokemon()">つぎのもんだい</button>
        </div>
      </section>

      <section id="dexPanel" class="panel hidden">
        <div class="panelHeader">
          <h2>📖 ポケモン図鑑</h2>
          <span id="dexCount"></span>
        </div>
        <div id="dexContent"></div>
      </section>
    </section>
  </main>

  <script src="app.js?v=20260623-pathguide1"></script>
</body>
</html>
